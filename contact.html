<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — BitsToBetter</title>
  <meta name="description" content="Contact BitsToBetter for partnerships, corrections, or privacy requests." />
  <link rel="canonical" href="https://bitstobetter.com/contact.html" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <meta name="theme-color" content="#0F172A" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/site.css" />
  <script src="/assets/site.js" defer></script>
</head>
<body class="antialiased text-slate-800">
  <header id="site-header" data-active="company"></header>
  <main class="max-w-xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-extrabold">Contact</h1>
    <p class="mt-2 text-slate-600">Email <a class="text-sky-600 underline" href="mailto:info@bitstobetter.com">info@bitstobetter.com</a> or privacy requests to <a class="text-sky-600 underline" href="mailto:privacy@bitstobetter.com">privacy@bitstobetter.com</a>.</p>
    <form class="mt-8 space-y-4" action="mailto:info@bitstobetter.com" method="get" enctype="text/plain">
      <div>
        <label for="name" class="block text-sm font-semibold">Name</label>
        <input id="name" name="subject" type="text" required class="mt-1 w-full border border-slate-300 rounded-md px-3 py-2" />
      </div>
      <div>
        <label for="body" class="block text-sm font-semibold">Message</label>
        <textarea id="body" name="body" rows="5" required class="mt-1 w-full border border-slate-300 rounded-md px-3 py-2"></textarea>
      </div>
      <button type="submit" class="px-4 py-2 bg-sky-600 text-white font-semibold rounded-md">Send via email client</button>
    </form>
  </main>
  <footer id="site-footer"></footer>
</body>
</html>
